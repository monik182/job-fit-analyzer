<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Fit Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;



const MONICA_PROFILE = `
PROFILE SUMMARY:
Software Engineer with a product mindset, 9+ years of experience. Early adopter of AI integrations (OpenAI/RAG at Microsoft Research). Building The Planner App (315+ users, organic growth).

CURRENT ROLE:
Front-end Engineer II at Fetcher (Oct 2023 - Present, Remote)
- Develop and maintain frontend across 3 core products (client platform, admin dashboard, browser extension)
- Contributed to 2 major redesigns of search pages
- Built the frontend for AI-driven features (generated responses, job-description-based search), handling full UI implementation and API integration
- Led frontend implementation of Directory page redesign, owning ~80% of UI development
- Contributing to new unified browser extension replacing 2 legacy extensions (5 apps to 3)
- Contribute product/UX input validated through Mixpanel
Tech: TypeScript, React.js, Node.js, Cypress, Jest, GitHub Actions, Storybook, Chrome Extensions

PREVIOUS: Microsoft - Software Engineer (Feb 2021 - Oct 2023)
- Contributed to 4 open-source projects: ShowWhy, Transparency Engine, DataShaper, Essex Toolkit
- Built ShowWhy (causal inference tool for data scientists), frontend with React
- Implemented early OpenAI integrations and RAG-based features (late 2022, before mainstream LLM adoption)
- Developed backend services with Python and FastAPI for Transparency Engine
- Team of ~15-20 engineers, data scientists, researchers
Tech: TypeScript, React.js, Node.js, Recoil.js, Playwright, Jest, Azure DevOps, Python, FastAPI, OpenAI

PREVIOUS: Farmatodo - Web Lead (2019 - Jan 2021)
- Improved website performance ~70% migrating AngularJS to Angular 10+
- Reduced deployment time ~50% with Google Cloud Build
- Improved SEO ~80% with Angular Universal
- Implemented Google Analytics for e-commerce metrics

PREVIOUS: Farmatodo - Front End Engineer (2017 - 2019)
- Frontend development with AngularJS for e-commerce platform

PROJECTS:
- The Planner App: 315+ registered users, organic growth from Reddit, monetized via Buy Me a Coffee. React, Next.js, Supabase, Vercel.
- PDF Expense Extractor: AI-powered table extraction from PDFs to CSV/XLSX. React, Vite, Supabase (Auth, DB, Edge Functions), OpenAI, Stripe.

CORE SKILLS: JavaScript, TypeScript, React.js, Next.js, Node.js, Supabase, OpenAI, n8n, Vite, Vercel, Stripe, HTML, SASS/CSS, Express, Postgres, Git
LANGUAGES: English C2, Spanish Native
EDUCATION: B.Eng. Telecommunications, Scrimba AI Engineer Path (2025), n8n Course (2025)

PREFERENCES:
- 100% remote, non-negotiable
- Flexible hours, non-negotiable
- Salary range: 80-100K USD
- Company size preference: 50-500 employees
- Priorities: 1) Salary 2) Autonomy 3) Learning 4) Product interest
- Open to: Fullstack Engineer, AI-integrated Engineer, Product Engineer, Frontend Senior
- Contractor status (no employment benefits)
- Based in Valencia, Spain (CET timezone)
- Also open to freelance

HONEST LIMITATIONS:
- Python: has some experience (FastAPI at Microsoft) but not senior-level
- AI/ML: integrated OpenAI APIs and did rudimentary RAG, but NOT an AI/ML engineer
- Backend: can do Node.js and some Python, but is primarily frontend
- No experience with: Kubernetes, advanced DevOps, mobile development, low-level systems
- The OpenAI/RAG work at Microsoft was early and experimental, not production-grade ML pipelines
`;

const SYSTEM_PROMPT = `You are Monica's personal job fit advisor. You know her profile deeply. You are REALISTIC and ENCOURAGING while still being honest.

Here is Monica's complete profile:
${MONICA_PROFILE}

CRITICAL CONTEXT: Monica is in a stressful job situation (salary cut, possible layoff) and needs to apply aggressively. She has impostor syndrome and tends to underestimate herself. Your job is to COUNTER that by being realistic about how hiring actually works.

KEY PRINCIPLE: Job postings are WISH LISTS, not hard requirements. Companies routinely hire candidates who match 50-70% of listed requirements. Monica has 9+ years of experience, Microsoft on her CV, and a product with 315+ users. She is a STRONG candidate for most mid-level and many senior frontend/fullstack roles.

Your job is to:
1. Analyze job postings against Monica's real skills and experience
2. Give a FIT SCORE from 0-100
3. Be honest about genuine dealbreakers (e.g. role requires 5+ years of Python ML, or is on-site only) but DO NOT penalize heavily for nice-to-haves she doesn't have
4. When she CAN apply, help her craft compelling but honest cover letters
5. DEFAULT TO ENCOURAGING HER TO APPLY unless there's a genuine dealbreaker

SCORING GUIDE:
- 80-100: Strong fit. Core skills match well. Apply immediately.
- 60-79: Good fit. She meets the core requirements, some nice-to-haves missing. APPLY.
- 45-59: Stretch but worth it. She meets ~50% of requirements but could grow into the role. Apply if the role interests her.
- 30-44: Significant gaps in CORE requirements (not nice-to-haves). Probably skip unless desperate.
- 0-29: Wrong role entirely (e.g. pure ML engineer, mobile dev, DevOps). Skip.

IMPORTANT SCORING RULES:
- If Monica matches the PRIMARY tech stack (React, TypeScript, Node.js, Next.js) and the role is frontend or fullstack, minimum score is 55 even if she's missing secondary requirements
- "Nice to have" items that she doesn't know should NOT drop the score below 60 if core skills match
- Experience with "similar tools" counts. E.g. if they ask for Redux and she knows Recoil, that's close enough
- Her product (The Planner App, 315 users) is a MAJOR differentiator that most candidates don't have. Factor this in positively
- Her Microsoft experience adds credibility. Factor this in
- 9 years of experience qualifies her for senior roles even if she doesn't feel "senior"

IMPORTANT: At the very beginning of your analysis, output this metadata block exactly (fill in the values based on the job posting):
[JOB_META]
title: <job title>
company: <company name>
[/JOB_META]

RULES:
- Always respond in the SAME LANGUAGE as the job posting (if posting is in English, respond in English; if in Spanish, respond in Spanish)
- Be direct and concise. No fluff.
- Only flag Python/ML as a dealbreaker if it's the PRIMARY focus of the role, not if it's a nice-to-have
- If the role doesn't mention remote, flag it as a QUESTION TO ASK, not a dealbreaker
- If salary is listed and below 80K, mention it but don't tell her not to apply
- Always mention which of her experiences are most relevant
- In GAPS section, clearly separate DEALBREAKERS from NICE-TO-HAVES she can learn
- Always end with a clear "APPLY" or "SKIP" recommendation
- For cover letters: be honest, highlight real strengths, don't fabricate experience
- Cover letters should be 150-200 words max, direct, no cliches like "I'm excited" or "passionate about"
- NEVER list more than 3 gaps. Focus on what matters, not an exhaustive list of everything she doesn't know`;

function JobAnalyzer() {
  const [page, setPage] = useState("analyzer");
  const [jobText, setJobText] = useState("");
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(false);
  const [followUp, setFollowUp] = useState("");
  const [analyzed, setAnalyzed] = useState(false);
  const [currentMeta, setCurrentMeta] = useState(null);
  const [history, setHistory] = useState([]);
  const [historyLoaded, setHistoryLoaded] = useState(false);
  const [trackUrl, setTrackUrl] = useState("");
  const [showTracker, setShowTracker] = useState(false);
  const [expanded, setExpanded] = useState({});
  const [importModal, setImportModal] = useState(null);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("anthropic-api-key") || "");
  const chatRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    function loadHistory() {
      try {
        const result = localStorage.getItem("job-applications");
        if (result) {
          setHistory(JSON.parse(result));
        }
      } catch (e) {}
      setHistoryLoaded(true);
    }
    loadHistory();
  }, []);

  const saveHistory = async (newHistory) => {
    setHistory(newHistory);
    try {
      localStorage.setItem("job-applications", JSON.stringify(newHistory));
    } catch (e) {
      console.error("Failed to save history:", e);
    }
  };

  const callClaude = async (userMessage, hist = []) => {
    const allMessages = [...hist, { role: "user", content: userMessage }];
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: allMessages,
      }),
    });
    const data = await response.json();
    const text = data.content
      .filter((b) => b.type === "text")
      .map((b) => b.text)
      .join("\n");
    return { text, allMessages };
  };

  const parseMeta = (text) => {
    const metaMatch = text.match(/\[JOB_META\]([\s\S]*?)\[\/JOB_META\]/);
    if (!metaMatch) return null;
    const block = metaMatch[1];
    const title = block.match(/title:\s*(.+)/i)?.[1]?.trim() || "Unknown Role";
    const company = block.match(/company:\s*(.+)/i)?.[1]?.trim() || "Unknown Company";
    return { title, company };
  };

  const cleanResponse = (text) => {
    return text.replace(/\[JOB_META\][\s\S]*?\[\/JOB_META\]\n?/, "").trim();
  };

  const analyze = async () => {
    if (!jobText.trim()) return;
    setLoading(true);
    setMessages([]);
    setAnalyzed(false);
    setCurrentMeta(null);
    setShowTracker(false);
    setTrackUrl("");
    try {
      const prompt = `Analyze this job posting for fit with Monica's profile. Give:
1. FIT SCORE (0-100) with a one-line verdict
2. MATCHES (what aligns with her profile)
3. GAPS (what she's missing - be honest)
4. VERDICT (should she apply? yes/no/maybe + why)
5. If score >= 50, suggest which experiences to highlight in application

Job posting:
${jobText}`;
      const { text, allMessages } = await callClaude(prompt);
      const meta = parseMeta(text);
      const cleaned = cleanResponse(text);
      setCurrentMeta(meta);
      setMessages([
        { role: "user", content: prompt },
        { role: "assistant", content: cleaned },
      ]);
      setAnalyzed(true);
      setShowTracker(true);
    } catch (e) {
      setMessages([
        { role: "assistant", content: "Error connecting to API. Try again." },
      ]);
    }
    setLoading(false);
  };

  const sendFollowUp = async () => {
    if (!followUp.trim()) return;
    setLoading(true);
    const newMessages = [...messages, { role: "user", content: followUp }];
    setMessages(newMessages);
    setFollowUp("");
    try {
      const { text } = await callClaude(followUp, messages);
      const cleaned = cleanResponse(text);
      setMessages([...newMessages, { role: "assistant", content: cleaned }]);
    } catch (e) {
      setMessages([...newMessages, { role: "assistant", content: "Error. Try again." }]);
    }
    setLoading(false);
    setTimeout(() => chatRef.current?.scrollTo(0, chatRef.current.scrollHeight), 100);
  };

  const STAGES = ["Applied", "First Round", "Technical", "Offer", "Accepted"];
  const TERMINAL_STAGES = ["Rejected"];
  const ALL_STAGES = [...STAGES, ...TERMINAL_STAGES];

  const getStageColor = (stage) => {
    const colors = { "Applied": "#6366f1", "First Round": "#3b82f6", "Technical": "#d97706", "Offer": "#059669", "Accepted": "#10b981", "Rejected": "#dc2626", "Skipped": "#475569" };
    return colors[stage] || "#475569";
  };

  const trackApplication = async (applied) => {
    const firstAssistant = messages.find((m) => m.role === "assistant");
    const score = firstAssistant ? getScoreFromText(firstAssistant.content) : null;
    const analysis = firstAssistant ? firstAssistant.content : null;
    const initialStage = applied ? "Applied" : "Skipped";
    const entry = {
      id: Date.now().toString(),
      date: new Date().toISOString(),
      title: currentMeta?.title || "Unknown Role",
      company: currentMeta?.company || "Unknown Company",
      url: trackUrl.trim() || null,
      applied,
      score,
      analysis,
      stageHistory: [{ date: new Date().toISOString(), stage: initialStage }],
    };
    const newHistory = [entry, ...history];
    await saveHistory(newHistory);
    setShowTracker(false);
  };

  const updateStage = async (id, newStage) => {
    const newHistory = history.map((h) => {
      if (h.id !== id) return h;
      const stageHistory = [...(h.stageHistory || []), { date: new Date().toISOString(), stage: newStage }];
      return { ...h, stageHistory };
    });
    await saveHistory(newHistory);
  };

  const getLatestStage = (entry) => {
    if (!entry.stageHistory || entry.stageHistory.length === 0) {
      return entry.applied ? "Applied" : "Skipped";
    }
    return entry.stageHistory[entry.stageHistory.length - 1].stage;
  };

  const deleteEntry = async (id) => {
    const newHistory = history.filter((h) => h.id !== id);
    await saveHistory(newHistory);
  };

  const clearChat = () => {
    setMessages([]);
    setJobText("");
    setAnalyzed(false);
    setCurrentMeta(null);
    setShowTracker(false);
    setTrackUrl("");
    setFollowUp("");
  };

  const getScoreFromText = (text) => {
    const match = text.match(/(\d{1,3})\s*[\/\|]?\s*100/);
    if (match) return parseInt(match[1]);
    const match2 = text.match(/FIT SCORE[:\s]*(\d{1,3})/i);
    if (match2) return parseInt(match2[1]);
    return null;
  };

  const getScoreColor = (score) => {
    if (score >= 80) return "#059669";
    if (score >= 60) return "#059669";
    if (score >= 45) return "#d97706";
    if (score >= 30) return "#ea580c";
    return "#dc2626";
  };

  const getScoreLabel = (score) => {
    if (score >= 80) return "Strong fit — Apply!";
    if (score >= 60) return "Good fit — Apply!";
    if (score >= 45) return "Stretch — Worth trying";
    if (score >= 30) return "Significant gaps";
    return "Skip this one";
  };

  const firstAssistant = messages.find((m) => m.role === "assistant");
  const score = firstAssistant ? getScoreFromText(firstAssistant.content) : null;

  const renderMarkdown = (text) => {
    const lines = text.split("\n");
    return lines.map((line, i) => {
      const boldLine = line.replace(
        /\*\*(.*?)\*\*/g,
        '<strong style="color:#e2e8f0">$1</strong>'
      );
      if (line.startsWith("# "))
        return (<h2 key={i} style={{ fontSize: 18, fontWeight: 700, color: "#f1f5f9", margin: "16px 0 8px", letterSpacing: "-0.01em" }}>{line.slice(2)}</h2>);
      if (line.startsWith("## "))
        return (<h3 key={i} style={{ fontSize: 15, fontWeight: 700, color: "#cbd5e1", margin: "14px 0 6px", textTransform: "uppercase", letterSpacing: "0.05em" }}>{line.slice(3)}</h3>);
      if (line.startsWith("- ") || line.startsWith("* "))
        return (<div key={i} style={{ display: "flex", gap: 8, marginBottom: 4, fontSize: 14, lineHeight: 1.5, color: "#94a3b8" }}><span style={{ color: "#64748b", flexShrink: 0 }}>•</span><span dangerouslySetInnerHTML={{ __html: boldLine.slice(2) }} /></div>);
      if (line.trim() === "") return <div key={i} style={{ height: 8 }} />;
      return (<p key={i} style={{ fontSize: 14, lineHeight: 1.6, color: "#94a3b8", margin: "2px 0" }} dangerouslySetInnerHTML={{ __html: boldLine }} />);
    });
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
  };

  const downloadCsv = () => {
    const escape = (val) => {
      if (val == null) return "";
      const str = String(val);
      if (str.includes(",") || str.includes('"') || str.includes("\n")) {
        return `"${str.replace(/"/g, '""')}"`;
      }
      return str;
    };
    const headers = ["Date", "Company", "Title", "Score", "URL", "Current Stage", "Applied", "Stage History", "Analysis"];
    const rows = history.map((h) => [
      formatDate(h.date),
      h.company,
      h.title,
      h.score,
      h.url || "",
      getLatestStage(h),
      h.applied ? "Yes" : "No",
      (h.stageHistory || []).map((s) => `${s.stage} (${formatDate(s.date)})`).join(" → "),
      h.analysis || "",
    ]);
    const csv = [headers, ...rows].map((r) => r.map(escape).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `job-applications-${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const parseCsvLine = (line) => {
    const result = [];
    let current = "";
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current); current = ""; }
        else { current += ch; }
      }
    }
    result.push(current);
    return result;
  };

  const handleFileUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const lines = text.split("\n").filter((l) => l.trim());
        if (lines.length < 2) return;
        const headers = parseCsvLine(lines[0]).map((h) => h.trim().toLowerCase());
        const safeDate = (str) => {
          if (!str) return new Date().toISOString();
          const months = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
          const m = str.match(/(\d{1,2})\s+([A-Za-z]{3})\s+(\d{4})/);
          if (m) return new Date(parseInt(m[3]), months[m[2].toLowerCase()] ?? 0, parseInt(m[1])).toISOString();
          const d = new Date(str);
          return isNaN(d.getTime()) ? new Date().toISOString() : d.toISOString();
        };
        const parsed = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCsvLine(lines[i]);
          const get = (name) => {
            const idx = headers.indexOf(name);
            return idx >= 0 ? cols[idx]?.trim() || "" : "";
          };
          const stageStr = get("stage history");
          const stageHistory = stageStr
            ? stageStr.split("→").map((s) => {
                const match = s.trim().match(/^(.+?)\s*\((.+?)\)$/);
                return match ? { stage: match[1].trim(), date: safeDate(match[2]) } : null;
              }).filter(Boolean)
            : [{ date: new Date().toISOString(), stage: get("applied") === "Yes" ? (get("current stage") || "Applied") : "Skipped" }];
          parsed.push({
            id: Date.now().toString() + i,
            date: safeDate(get("date")),
            company: get("company") || "Unknown",
            title: get("title") || "Unknown",
            score: get("score") ? parseInt(get("score")) : null,
            url: get("url") || null,
            applied: get("applied") !== "No",
            analysis: get("analysis") || null,
            stageHistory,
          });
        }
        if (parsed.length > 0) {
          setImportModal(parsed);
        }
      } catch (err) {
        console.error("CSV parse error:", err);
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const importRecords = async (mode) => {
    if (!importModal) return;
    if (mode === "replace") {
      await saveHistory(importModal);
    } else {
      const existingIds = new Set(history.map((h) => `${h.company}-${h.title}-${h.date}`));
      const newOnes = importModal.filter((h) => !existingIds.has(`${h.company}-${h.title}-${h.date}`));
      await saveHistory([...newOnes, ...history]);
    }
    setImportModal(null);
  };

  const styles = {
    page: { minHeight: "100vh", background: "#0a0f1a", fontFamily: '"JetBrains Mono", "SF Mono", "Fira Code", monospace', color: "#e2e8f0" },
    container: { maxWidth: 720, margin: "0 auto", padding: "32px 16px" },
    btn: (active) => ({ background: active ? "transparent" : "transparent", color: active ? "#e2e8f0" : "#475569", border: "none", borderBottom: active ? "2px solid #6366f1" : "2px solid transparent", padding: "8px 16px", fontSize: 13, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif', fontWeight: 600, transition: "all 0.2s" }),
    card: { background: "#0f1629", border: "1px solid #1e293b", borderRadius: 12, padding: "16px 20px", marginBottom: 12 },
    primaryBtn: (disabled) => ({ background: disabled ? "#1e293b" : "linear-gradient(135deg, #3b82f6, #6366f1)", color: disabled ? "#475569" : "#fff", border: "none", borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 600, cursor: disabled ? "not-allowed" : "pointer", fontFamily: '"Space Grotesk", sans-serif', transition: "all 0.2s" }),
    ghostBtn: { background: "transparent", border: "1px solid #1e293b", borderRadius: 8, padding: "8px 16px", color: "#64748b", fontSize: 12, cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s" },
  };

  return (
    <div style={styles.page}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        textarea:focus, input:focus { outline: none; }
        ::placeholder { color: #334155; }
        textarea::-webkit-scrollbar, div::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track, div::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb, div::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>

      <div style={styles.container}>
        {/* Header */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#22c55e", boxShadow: "0 0 8px #22c55e88" }} />
            <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.12em", color: "#64748b", fontWeight: 500 }}>Online</span>
          </div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: "#f8fafc", margin: "0 0 4px", fontFamily: '"Space Grotesk", sans-serif' }}>Job Fit Analyzer</h1>
          <p style={{ fontSize: 13, color: "#475569", margin: "0 0 12px" }}>Paste a job posting. I'll tell you if it's worth your time.</p>
          {!apiKey && (
            <div style={{ background: "#1e0a0a", border: "1px solid #dc262633", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#f87171", marginBottom: 0 }}>
              Add your Anthropic API key below to enable analysis.
            </div>
          )}
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
            <input
              type="password"
              value={apiKey}
              onChange={(e) => { setApiKey(e.target.value); localStorage.setItem("anthropic-api-key", e.target.value); }}
              placeholder="Anthropic API key (sk-ant-...)"
              style={{ flex: 1, background: "#0f1629", border: "1px solid #1e293b", borderRadius: 6, padding: "8px 12px", color: "#475569", fontSize: 11, fontFamily: "inherit" }}
            />
            {apiKey && <span style={{ fontSize: 11, color: "#059669" }}>✓</span>}
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 24, borderBottom: "1px solid #1e293b" }}>
          <button style={styles.btn(page === "analyzer")} onClick={() => setPage("analyzer")}>Analyzer</button>
          <button style={styles.btn(page === "history")} onClick={() => setPage("history")}>
            History {history.length > 0 && <span style={{ background: "#6366f1", color: "#fff", borderRadius: 99, padding: "1px 7px", fontSize: 11, marginLeft: 6 }}>{history.length}</span>}
          </button>
        </div>

        {/* ===== ANALYZER PAGE ===== */}
        {page === "analyzer" && (
          <>
            {/* Input */}
            <div style={{ background: "#0f1629", border: "1px solid #1e293b", borderRadius: 12, padding: 2, marginBottom: 20 }}>
              <textarea
                value={jobText}
                onChange={(e) => setJobText(e.target.value)}
                placeholder="Paste the full job posting here..."
                rows={8}
                style={{ width: "100%", background: "transparent", border: "none", color: "#cbd5e1", fontSize: 13, lineHeight: 1.6, padding: "16px 18px", resize: "vertical", fontFamily: "inherit" }}
              />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", borderTop: "1px solid #1e293b" }}>
                <span style={{ fontSize: 11, color: "#334155" }}>
                  {jobText.length > 0 ? `${jobText.split(/\s+/).filter(Boolean).length} words` : ""}
                </span>
                <div style={{ display: "flex", gap: 8 }}>
                  {analyzed && (
                    <button onClick={clearChat} style={styles.ghostBtn}>Clear</button>
                  )}
                  <button onClick={analyze} disabled={loading || !jobText.trim() || !apiKey} style={styles.primaryBtn(loading || !jobText.trim())}>
                    {loading && !analyzed ? "Analyzing..." : "Analyze"}
                  </button>
                </div>
              </div>
            </div>

            {/* Score Badge */}
            {score !== null && (
              <div style={{ display: "flex", alignItems: "center", gap: 16, background: "#0f1629", border: `1px solid ${getScoreColor(score)}33`, borderRadius: 12, padding: "16px 20px", marginBottom: 20, animation: "slideUp 0.3s ease" }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", border: `3px solid ${getScoreColor(score)}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 20, fontWeight: 700, color: getScoreColor(score), fontFamily: '"Space Grotesk", sans-serif' }}>{score}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: getScoreColor(score), fontFamily: '"Space Grotesk", sans-serif' }}>{getScoreLabel(score)}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Fit score out of 100</div>
                </div>
                {currentMeta && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#cbd5e1" }}>{currentMeta.title}</div>
                    <div style={{ fontSize: 12, color: "#64748b" }}>{currentMeta.company}</div>
                  </div>
                )}
              </div>
            )}

            {/* Application Tracker */}
            {showTracker && analyzed && !loading && (
              <div style={{ ...styles.card, animation: "slideUp 0.3s ease", borderColor: "#6366f133" }}>
                <div style={{ fontSize: 12, color: "#64748b", marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600 }}>Track this application</div>
                <input
                  value={trackUrl}
                  onChange={(e) => setTrackUrl(e.target.value)}
                  placeholder="Job URL (optional)"
                  style={{ width: "100%", background: "#0a0f1a", border: "1px solid #1e293b", borderRadius: 6, padding: "8px 12px", color: "#cbd5e1", fontSize: 12, fontFamily: "inherit", marginBottom: 10 }}
                />
                <div style={{ display: "flex", gap: 8 }}>
                  <button
                    onClick={() => trackApplication(true)}
                    style={{ flex: 1, background: "#059669", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}
                  >
                    Applied
                  </button>
                  <button
                    onClick={() => trackApplication(false)}
                    style={{ flex: 1, background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}
                  >
                    Skipped
                  </button>
                </div>
              </div>
            )}

            {/* Chat */}
            {messages.length > 0 && (
              <div ref={chatRef} style={{ background: "#0f1629", border: "1px solid #1e293b", borderRadius: 12, padding: "20px", marginBottom: 20, maxHeight: 500, overflowY: "auto" }}>
                {messages
                  .filter((m, i) => !(i === 0 && m.role === "user"))
                  .map((m, i) =>
                    m.role === "user" ? (
                      <div key={i} style={{ fontSize: 13, color: "#a5b4fc", fontWeight: 600, margin: "16px 0 8px", paddingTop: 12, borderTop: "1px solid #1e293b" }}>{m.content}</div>
                    ) : (
                      <div key={i} style={{ animation: "slideUp 0.3s ease" }}>{renderMarkdown(m.content)}</div>
                    )
                  )}
                {loading && (
                  <div style={{ display: "flex", gap: 4, padding: "12px 0" }}>
                    {[0, 1, 2].map((i) => (
                      <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: "#6366f1", animation: `pulse 1s ease-in-out ${i * 0.2}s infinite` }} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Follow up */}
            {analyzed && (
              <div style={{ display: "flex", gap: 8, animation: "slideUp 0.3s ease" }}>
                <input
                  value={followUp}
                  onChange={(e) => setFollowUp(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && !loading && sendFollowUp()}
                  placeholder="Ask anything... (e.g. 'write me a cover letter')"
                  style={{ flex: 1, background: "#0f1629", border: "1px solid #1e293b", borderRadius: 8, padding: "12px 16px", color: "#cbd5e1", fontSize: 13, fontFamily: "inherit" }}
                />
                <button onClick={sendFollowUp} disabled={loading || !followUp.trim()} style={styles.primaryBtn(loading || !followUp.trim())}>
                  Send
                </button>
              </div>
            )}

            {/* Quick actions */}
            {analyzed && !loading && (
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", animation: "slideUp 0.4s ease" }}>
                {["Write me a cover letter", "What questions should I prepare for?", "How do I address the gaps?"].map((q) => (
                  <button
                    key={q}
                    onClick={async () => {
                      const newMessages = [...messages, { role: "user", content: q }];
                      setMessages(newMessages);
                      setLoading(true);
                      try {
                        const { text } = await callClaude(q, messages);
                        const cleaned = cleanResponse(text);
                        setMessages([...newMessages, { role: "assistant", content: cleaned }]);
                      } catch (e) {
                        setMessages([...newMessages, { role: "assistant", content: "Error. Try again." }]);
                      }
                      setLoading(false);
                      setTimeout(() => chatRef.current?.scrollTo(0, chatRef.current.scrollHeight), 100);
                    }}
                    style={styles.ghostBtn}
                    onMouseEnter={(e) => { e.target.style.borderColor = "#6366f1"; e.target.style.color = "#a5b4fc"; }}
                    onMouseLeave={(e) => { e.target.style.borderColor = "#1e293b"; e.target.style.color = "#64748b"; }}
                  >
                    {q}
                  </button>
                ))}
              </div>
            )}
          </>
        )}

        {/* ===== HISTORY PAGE ===== */}
        {page === "history" && (
          <>
            {!historyLoaded ? (
              <p style={{ color: "#64748b", fontSize: 14 }}>Loading history...</p>
            ) : history.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px" }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>📋</div>
                <p style={{ color: "#475569", fontSize: 14 }}>No applications tracked yet.</p>
                <p style={{ color: "#334155", fontSize: 12, marginBottom: 16 }}>Analyze a job posting and track it to see it here.</p>
                <input type="file" accept=".csv" ref={fileRef} onChange={handleFileUpload} style={{ display: "none" }} />
                <button
                  onClick={() => fileRef.current?.click()}
                  style={styles.ghostBtn}
                  onMouseEnter={(e) => { e.target.style.borderColor = "#6366f1"; e.target.style.color = "#a5b4fc"; }}
                  onMouseLeave={(e) => { e.target.style.borderColor = "#1e293b"; e.target.style.color = "#64748b"; }}
                >
                  ↑ Import CSV
                </button>
                {importModal && (
                  <div style={{ ...styles.card, borderColor: "#6366f133", animation: "slideUp 0.2s ease", marginTop: 16, textAlign: "left" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", marginBottom: 4 }}>Import {importModal.length} records</div>
                    <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                      <button onClick={() => importRecords("replace")} style={{ flex: 1, background: "#6366f1", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}>Import</button>
                      <button onClick={() => setImportModal(null)} style={{ background: "transparent", border: "1px solid #334155", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#475569", cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <>
                {/* Stats */}
                <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
                  {[
                    { label: "Total", value: history.length, color: "#6366f1" },
                    { label: "Active", value: history.filter((h) => { const s = getLatestStage(h); return s !== "Rejected" && s !== "Skipped" && s !== "Accepted"; }).length, color: "#3b82f6" },
                    { label: "Offers", value: history.filter((h) => { const s = getLatestStage(h); return s === "Offer" || s === "Accepted"; }).length, color: "#059669" },
                    { label: "Rejected", value: history.filter((h) => getLatestStage(h) === "Rejected").length, color: "#dc2626" },
                    { label: "Skipped", value: history.filter((h) => getLatestStage(h) === "Skipped").length, color: "#475569" },
                  ].map((s) => (
                    <div key={s.label} style={{ flex: "1 1 0", minWidth: 60, background: "#0f1629", border: "1px solid #1e293b", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                      <div style={{ fontSize: 18, fontWeight: 700, color: s.color, fontFamily: '"Space Grotesk", sans-serif' }}>{s.value}</div>
                      <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 2 }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                {/* Actions */}
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginBottom: 16 }}>
                  <input type="file" accept=".csv" ref={fileRef} onChange={handleFileUpload} style={{ display: "none" }} />
                  <button
                    onClick={() => fileRef.current?.click()}
                    style={styles.ghostBtn}
                    onMouseEnter={(e) => { e.target.style.borderColor = "#6366f1"; e.target.style.color = "#a5b4fc"; }}
                    onMouseLeave={(e) => { e.target.style.borderColor = "#1e293b"; e.target.style.color = "#64748b"; }}
                  >
                    ↑ Import CSV
                  </button>
                  <button
                    onClick={downloadCsv}
                    style={styles.ghostBtn}
                    onMouseEnter={(e) => { e.target.style.borderColor = "#6366f1"; e.target.style.color = "#a5b4fc"; }}
                    onMouseLeave={(e) => { e.target.style.borderColor = "#1e293b"; e.target.style.color = "#64748b"; }}
                  >
                    ↓ Export CSV
                  </button>
                </div>

                {/* Import Modal */}
                {importModal && (
                  <div style={{ ...styles.card, borderColor: "#6366f133", animation: "slideUp 0.2s ease", marginBottom: 16 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", marginBottom: 4 }}>Import {importModal.length} records</div>
                    <p style={{ fontSize: 12, color: "#64748b", margin: "0 0 14px" }}>You currently have {history.length} records. What do you want to do?</p>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        onClick={() => importRecords("merge")}
                        style={{ flex: 1, background: "#6366f1", color: "#fff", border: "none", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}
                      >
                        Merge
                      </button>
                      <button
                        onClick={() => importRecords("replace")}
                        style={{ flex: 1, background: "#1e293b", color: "#e2e8f0", border: "1px solid #334155", borderRadius: 8, padding: "10px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}
                      >
                        Replace all
                      </button>
                      <button
                        onClick={() => setImportModal(null)}
                        style={{ background: "transparent", border: "1px solid #334155", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#475569", cursor: "pointer", fontFamily: '"Space Grotesk", sans-serif' }}
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                )}

                {/* Entries */}
                {history.map((entry) => {
                  const latestStage = getLatestStage(entry);
                  const isExpanded = expanded[entry.id] || false;
                  const stageColor = getStageColor(latestStage);

                  return (
                    <div key={entry.id} style={{ ...styles.card, padding: 0, overflow: "hidden" }}>
                      {/* Main row - clickable */}
                      <div
                        onClick={() => setExpanded((p) => ({ ...p, [entry.id]: !p[entry.id] }))}
                        style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 20px", cursor: "pointer" }}
                      >
                        {/* Score circle */}
                        <div style={{ width: 40, height: 40, borderRadius: "50%", border: `2px solid ${entry.score !== null ? getScoreColor(entry.score) : "#334155"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: entry.score !== null ? getScoreColor(entry.score) : "#475569", fontFamily: '"Space Grotesk", sans-serif' }}>
                            {entry.score !== null ? entry.score : "?"}
                          </span>
                        </div>

                        {/* Info */}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <span style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}>
                            {entry.title}
                          </span>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
                            <span style={{ fontSize: 12, color: "#64748b" }}>{entry.company}</span>
                            <span style={{ fontSize: 10, color: "#334155" }}>•</span>
                            <span style={{ fontSize: 12, color: "#475569" }}>{formatDate(entry.date)}</span>
                            {entry.url && (
                              <>
                                <span style={{ fontSize: 10, color: "#334155" }}>•</span>
                                <a href={entry.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} style={{ fontSize: 12, color: "#6366f1", textDecoration: "none" }}>Link</a>
                              </>
                            )}
                          </div>
                        </div>

                        {/* Stage badge + delete + chevron */}
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{
                            fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 99,
                            background: `${stageColor}15`, color: stageColor, border: `1px solid ${stageColor}33`,
                            textTransform: "uppercase", letterSpacing: "0.05em",
                          }}>
                            {latestStage}
                          </span>
                          <button
                            onClick={(e) => { e.stopPropagation(); deleteEntry(entry.id); }}
                            style={{ background: "transparent", border: "none", color: "#334155", cursor: "pointer", fontSize: 16, padding: "2px 4px", lineHeight: 1 }}
                            onMouseEnter={(e) => e.target.style.color = "#dc2626"}
                            onMouseLeave={(e) => e.target.style.color = "#334155"}
                            title="Delete"
                          >
                            ×
                          </button>
                          <span style={{ color: "#475569", fontSize: 16, transition: "transform 0.2s", transform: isExpanded ? "rotate(180deg)" : "rotate(0)" }}>▾</span>
                        </div>
                      </div>

                      {/* Expanded content */}
                      {isExpanded && (
                        <div style={{ borderTop: "1px solid #1e293b", padding: "16px 20px", animation: "slideUp 0.2s ease" }}>
                          {/* Stage selector */}
                          {entry.applied && latestStage !== "Rejected" && latestStage !== "Accepted" && (
                            <div style={{ marginBottom: 16 }}>
                              <div style={{ fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 8 }}>Update stage</div>
                              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                {[...ALL_STAGES].filter((s) => s !== latestStage && s !== "Applied" && s !== "Skipped").map((stage) => (
                                  <button
                                    key={stage}
                                    onClick={() => updateStage(entry.id, stage)}
                                    style={{
                                      background: "transparent", border: `1px solid ${getStageColor(stage)}44`,
                                      borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 500,
                                      color: getStageColor(stage), cursor: "pointer", fontFamily: "inherit",
                                      transition: "all 0.2s",
                                    }}
                                    onMouseEnter={(e) => { e.target.style.background = `${getStageColor(stage)}15`; }}
                                    onMouseLeave={(e) => { e.target.style.background = "transparent"; }}
                                  >
                                    {stage}
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* Stage history timeline */}
                          {entry.stageHistory && entry.stageHistory.length > 0 && (
                            <div style={{ marginBottom: 16 }}>
                              <div style={{ fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 8 }}>Timeline</div>
                              <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                                {entry.stageHistory.map((sh, idx) => (
                                  <div key={idx} style={{ display: "flex", alignItems: "center", gap: 10, paddingLeft: 4 }}>
                                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: getStageColor(sh.stage), flexShrink: 0 }} />
                                      {idx < entry.stageHistory.length - 1 && (
                                        <div style={{ width: 1, height: 20, background: "#1e293b" }} />
                                      )}
                                    </div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, paddingBottom: idx < entry.stageHistory.length - 1 ? 8 : 0 }}>
                                      <span style={{ fontSize: 12, fontWeight: 600, color: getStageColor(sh.stage) }}>{sh.stage}</span>
                                      <span style={{ fontSize: 11, color: "#475569" }}>{formatDate(sh.date)}</span>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* Analysis */}
                          {entry.analysis && (
                            <div style={{ marginBottom: 12 }}>
                              <div style={{ fontSize: 11, color: "#475569", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 600, marginBottom: 8 }}>Analysis</div>
                              <div style={{ background: "#0a0f1a", borderRadius: 8, padding: "14px 16px", maxHeight: 300, overflowY: "auto" }}>
                                {renderMarkdown(entry.analysis)}
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<JobAnalyzer />);
</script>
</body>
</html>
